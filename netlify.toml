[build]
  functions = "netlify/functions"
  command = "cd '앱 화면 디자인 (10)' && pnpm install && pnpm build"
  publish = "앱 화면 디자인 (10)/dist"

[[plugins]]
  package = "@netlify/plugin-functions-install-core"

[[redirects]]
  from = "/api/credit-scores"
  to = "/.netlify/functions/credit-scores"
  status = 200

[[redirects]]
  from = "/api/credit-history"
  to = "/.netlify/functions/credit-history"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
